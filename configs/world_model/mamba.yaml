d_model: 512
d_state: 64
n_cat: 32
n_cls: 32
z_dim: 1024  # n_cat * n_cls
obs_dim: 64
act_dim: 25   # n_skus
n_reward_heads: 5
dropout: 0.1
encoder: "entity"      # "entity" (default) or "flat"
backbone: "mamba"      # "mamba" (default) or "gru"
use_symlog: true       # symlog transform on inputs/targets
use_twohot: true       # twohot categorical loss (vs raw MSE)
kl_scale: 1.0          # KL loss scale (0.0 disables stochastic latent)
